alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
domains:
  - domain: docs.arcane.finance
    type: PRIMARY
    zone: arcane.finance
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: arcane-docs
      match:
        path:
          prefix: /
name: arcane-docs
region: fra
static_sites:
  - build_command: npm run build:app-platform
    catchall_document: index.html
    environment_slug: node-js
    github:
      branch: main
      deploy_on_push: true
      repo: Polynom-Labs/docs
    index_document: index.html
    name: arcane-docs
    output_dir: dist
    source_dir: /
