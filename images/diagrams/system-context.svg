<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Arcane system context</title>
  <desc id="desc">System context diagram showing the end-user transaction path through a partner application, wallet, Soroban privacy-pool contract, Stellar ledger, and the Arcane Auditing Portal used by auditors and administrators.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d9e2f2; stroke-width: 1.5; rx: 22; }
      .panel-title { fill: #475569; font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; letter-spacing: .02em; }
      .box { fill: #ffffff; stroke: #9bb5df; stroke-width: 1.8; rx: 16; }
      .box-blue { fill: #eaf2ff; stroke: #6ca0dc; }
      .box-green { fill: #eaf8f0; stroke: #72b78d; }
      .box-amber { fill: #fff7df; stroke: #d4a72c; }
      .box-slate { fill: #eef2f7; stroke: #94a3b8; }
      .text { fill: #0f172a; font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 650; }
      .small { fill: #475569; font-family: Helvetica, Arial, sans-serif; font-size: 14px; }
      .label { fill: #334155; font-family: Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 650; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowSoft); }
      .path-title { fill: #0f172a; font-family: Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 800; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1320" height="760" rx="28" />
  <text x="56" y="66" class="path-title">Arcane system context</text>
  <text x="56" y="94" class="small">Two paths share the same Soroban contract: private transaction execution and compliance review.</text>

  <rect class="panel" x="56" y="135" width="1208" height="250" rx="22" />
  <text x="86" y="176" class="panel-title">Private transaction path</text>

  <rect class="box box-blue" x="92" y="220" width="180" height="88" rx="16" />
  <text x="122" y="258" class="text">End user</text>
  <text x="122" y="282" class="small">Stellar wallet holder</text>

  <rect class="box" x="334" y="220" width="204" height="88" rx="16" />
  <text x="362" y="254" class="text">Partner app</text>
  <text x="362" y="280" class="small">Uses SDK and wallet</text>

  <rect class="box" x="602" y="220" width="188" height="88" rx="16" />
  <text x="632" y="254" class="text">Stellar wallet</text>
  <text x="632" y="280" class="small">Signs transaction</text>

  <rect class="box box-green" x="854" y="210" width="230" height="108" rx="16" />
  <text x="886" y="250" class="text">Soroban privacy</text>
  <text x="886" y="276" class="text">pool contract</text>
  <text x="886" y="300" class="small">Verifies transact</text>

  <rect class="box box-amber" x="1146" y="220" width="88" height="88" rx="16" />
  <text x="1168" y="258" class="text">Ledger</text>
  <text x="1167" y="282" class="small">Events</text>

  <path class="arrow" d="M 272 264 H 334" />
  <path class="arrow" d="M 538 264 H 602" />
  <path class="arrow" d="M 790 264 H 854" />
  <path class="arrow" d="M 1084 264 H 1146" />

  <rect class="panel" x="56" y="430" width="1208" height="282" rx="22" />
  <text x="86" y="471" class="panel-title">Compliance review path</text>

  <rect class="box box-amber" x="92" y="516" width="190" height="88" rx="16" />
  <text x="124" y="552" class="text">Stellar ledger</text>
  <text x="124" y="578" class="small">Soroban events</text>

  <rect class="box box-green" x="360" y="502" width="230" height="116" rx="16" />
  <text x="394" y="540" class="text">Arcane Auditing</text>
  <text x="394" y="566" class="text">Portal</text>
  <text x="394" y="592" class="small">Indexing, cases, reports</text>

  <rect class="box box-slate" x="360" y="632" width="230" height="58" rx="14" />
  <text x="392" y="667" class="text">Identity provider</text>

  <rect class="box" x="692" y="490" width="180" height="70" rx="16" />
  <text x="742" y="532" class="text">Auditor</text>

  <rect class="box" x="692" y="574" width="228" height="70" rx="16" />
  <text x="724" y="616" class="text">Application admin</text>

  <rect class="box" x="970" y="532" width="228" height="70" rx="16" />
  <text x="1001" y="574" class="text">Organization admin</text>

  <path class="arrow" d="M 282 560 H 360" />
  <text x="294" y="543" class="label">scanned by</text>
  <path class="arrow-soft" d="M 475 632 V 618" />
  <path class="arrow" d="M 590 546 C 630 516, 650 524, 692 525" />
  <path class="arrow" d="M 590 575 C 630 604, 650 609, 692 609" />
  <path class="arrow" d="M 590 560 C 710 560, 822 568, 970 567" />
</svg>
