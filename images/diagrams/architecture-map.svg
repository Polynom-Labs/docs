<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="860" viewBox="0 0 1320 860" role="img" aria-labelledby="title desc">
  <title id="title">Arcane architecture map</title>
  <desc id="desc">Architecture map split into two paths. The first path shows private transaction execution, audit event emission, indexing, and interpretation. The second path shows portal access through identity, backend API, scoped storage, and Audit UI workflows.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d9e2f2; stroke-width: 1.5; rx: 24; }
      .panel-title { fill: #334155; font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 800; }
      .box { fill: #ffffff; stroke: #9bb5df; stroke-width: 1.8; rx: 16; }
      .box-blue { fill: #eaf2ff; stroke: #6ca0dc; }
      .box-green { fill: #ebf8f0; stroke: #70b88b; }
      .box-amber { fill: #fff7df; stroke: #d4a72c; }
      .box-slate { fill: #eef2f7; stroke: #94a3b8; }
      .text { fill: #0f172a; font-family: Helvetica, Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .small { fill: #475569; font-family: Helvetica, Arial, sans-serif; font-size: 13px; }
      .title { fill: #0f172a; font-family: Helvetica, Arial, sans-serif; font-size: 26px; font-weight: 850; }
      .note { fill: #64748b; font-family: Helvetica, Arial, sans-serif; font-size: 13px; }
      .label { fill: #334155; font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrowSoft); }
      .badge { fill: #2563eb; }
      .badge-text { fill: #ffffff; font-family: Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 800; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1320" height="860" rx="28" />
  <text x="56" y="64" class="title">Arcane architecture map</text>
  <text x="56" y="92" class="note">The system is easier to read as two paths: transaction/indexing and portal access.</text>

  <rect class="panel" x="56" y="132" width="1208" height="320" rx="24" />
  <text x="88" y="174" class="panel-title">Private transaction and indexing path</text>

  <rect class="box box-blue" x="92" y="228" width="164" height="82" rx="16" />
  <text x="116" y="260" class="text">Partner app</text>
  <text x="116" y="284" class="small">SDK + wallet</text>

  <rect class="box box-green" x="312" y="216" width="190" height="106" rx="16" />
  <text x="340" y="252" class="text">PrivacyPools</text>
  <text x="340" y="278" class="text">Contract.transact</text>
  <text x="340" y="302" class="small">Proof, state, token legs</text>

  <rect class="box box-amber" x="558" y="228" width="166" height="82" rx="16" />
  <text x="584" y="260" class="text">Audit event</text>
  <text x="584" y="284" class="small">AuditEncodedDigest</text>

  <rect class="box box-amber" x="780" y="228" width="142" height="82" rx="16" />
  <text x="808" y="260" class="text">Stellar RPC</text>
  <text x="808" y="284" class="small">Ledgers/events</text>

  <rect class="box box-green" x="978" y="192" width="210" height="76" rx="16" />
  <text x="1008" y="224" class="text">ScannerModule</text>
  <text x="1008" y="248" class="small">Writes raw audit</text>

  <rect class="box box-green" x="978" y="310" width="210" height="76" rx="16" />
  <text x="1008" y="342" class="text">Interpretation worker</text>
  <text x="1008" y="366" class="small">Writes interpreted rows</text>

  <path class="arrow" d="M 256 269 H 312" />
  <text x="268" y="250" class="label">submits</text>
  <path class="arrow" d="M 502 269 H 558" />
  <text x="512" y="250" class="label">emits</text>
  <path class="arrow" d="M 724 269 H 780" />
  <text x="736" y="250" class="label">read from</text>
  <path class="arrow" d="M 922 269 C 950 269, 950 230, 978 230" />
  <path class="arrow" d="M 1083 268 V 310" />

  <rect class="box box-slate" x="92" y="350" width="320" height="58" rx="14" />
  <text x="118" y="385" class="text">Contract state: commitments, nullifiers, roots</text>

  <rect class="box box-slate" x="558" y="350" width="300" height="58" rx="14" />
  <text x="584" y="374" class="text">Audit tables</text>
  <text x="584" y="396" class="small">audit, audit_chain, audit_interpretation</text>

  <rect class="box box-slate" x="958" y="420" width="250" height="1" rx="1" opacity="0" />

  <rect class="panel" x="56" y="500" width="1208" height="300" rx="24" />
  <text x="88" y="542" class="panel-title">Portal access and disclosure workflow</text>

  <rect class="box box-blue" x="92" y="606" width="180" height="84" rx="16" />
  <text x="120" y="638" class="text">Auditors and</text>
  <text x="120" y="662" class="text">administrators</text>

  <rect class="box box-slate" x="326" y="548" width="176" height="74" rx="16" />
  <text x="356" y="580" class="text">Identity provider</text>
  <text x="356" y="604" class="small">User/org session</text>

  <rect class="box box-blue" x="326" y="672" width="176" height="74" rx="16" />
  <text x="356" y="704" class="text">Audit UI</text>
  <text x="356" y="728" class="small">Org/app workspaces</text>

  <rect class="box box-green" x="574" y="606" width="210" height="84" rx="16" />
  <text x="604" y="638" class="text">Backend API</text>
  <text x="604" y="662" class="small">Guards and scoped queries</text>

  <rect class="box box-slate" x="852" y="548" width="158" height="74" rx="16" />
  <text x="884" y="580" class="text">Access data</text>
  <text x="884" y="604" class="small">orgs, permissions</text>

  <rect class="box box-slate" x="852" y="660" width="158" height="74" rx="16" />
  <text x="884" y="692" class="text">Workflow data</text>
  <text x="884" y="716" class="small">requests, cases</text>

  <rect class="box box-slate" x="1078" y="606" width="142" height="84" rx="16" />
  <text x="1106" y="638" class="text">Audit data</text>
  <text x="1106" y="662" class="small">interpreted rows</text>

  <path class="arrow" d="M 272 648 H 326" />
  <path class="arrow-soft" d="M 414 622 V 672" />
  <path class="arrow" d="M 502 709 C 536 709, 536 648, 574 648" />
  <path class="arrow" d="M 784 648 C 822 648, 820 585, 852 585" />
  <path class="arrow" d="M 784 648 C 824 648, 820 697, 852 697" />
  <path class="arrow" d="M 1010 648 H 1078" />

  <circle class="badge" cx="290" cy="269" r="14" />
  <text x="286" y="274" class="badge-text">1</text>
  <circle class="badge" cx="530" cy="269" r="14" />
  <text x="526" y="274" class="badge-text">2</text>
  <circle class="badge" cx="950" cy="246" r="14" />
  <text x="946" y="251" class="badge-text">3</text>
  <circle class="badge" cx="536" cy="648" r="14" />
  <text x="532" y="653" class="badge-text">4</text>
</svg>
